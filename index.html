<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name | Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="progress-bar"></div>

<!-- NAVBAR -->
<nav id="navbar">
  <h2>YourName</h2>

  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <button id="theme-toggle">🌙</button>
</nav>

<!-- HERO -->
<section id="home" class="section reveal">
  <h1>Your Name</h1>
  <h2><span id="typing"></span></h2>
  <p>Your intro here</p>

  <div class="cta">
    <a href="#projects" class="btn">View Work</a>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="section reveal">
  <h2>About Me</h2>
  <p>Edit your bio here</p>

  <div class="skills">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section reveal">
  <h2>Projects</h2>

  <!-- FILTER -->
  <div class="filters">
    <button onclick="filterProjects('all')">All</button>
    <button onclick="filterProjects('web')">Web</button>
    <button onclick="filterProjects('app')">App</button>
  </div>

  <div id="project-container" class="grid"></div>
</section>

<!-- CONTACT -->
<section id="contact" class="section reveal">
  <h2>Contact</h2>
  <form>
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

<button id="topBtn">↑</button>

<script src="script.js"></script>
</body>
</html>
