<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Subham Dey</title>
    <link rel="stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Subham.</a>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <section class="contact-section">
        <div class="contact-wrapper">
            <div class="contact-info-panel">
                <h2 class="heading">Get in <span>Touch</span></h2>
                <p class="description">
                    I am a first-year B.Tech CSE student specializing in AI & ML. 
                    Feel free to reach out for collaborations or project inquiries.
                </p>
                
                <div class="info-details">
                    <div class="info-box">
                        <i class='bx bxs-phone-call'></i>
                        <span>+91 9674218151</span>
                    </div>
                    <div class="info-box">
                        <i class='bx bxs-envelope'></i>
                        <span>ninjazx10rsubham@gmail.com</span>
                    </div>
                    <div class="info-box">
                        <i class='bx bxs-map'></i>
                        <span>Solapur, Maharashtra, India</span>
                    </div>
                </div>

                <div class="social-links-row">
                    <a href="https://instagram.com/subhamdey5535"><i class='bx bxl-instagram'></i></a>
                    <a href="https://github.com/ninjazx10rsubham-source"><i class='bx bxl-github'></i></a>
                </div>
            </div>

            <div class="contact-form-panel">
                <form action="#">
                    <div class="dual-input">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <input type="text" placeholder="Subject">
                    <textarea placeholder="How can I help you?" rows="8" required></textarea>
                    <button type="submit" class="btn">Send Message <i class='bx bxs-paper-plane'></i></button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
